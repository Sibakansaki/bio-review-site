<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生物觀念複習站 🧬</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Loading Screen -->
<div id="loadingScreen">
  <div class="loading-icon">🧬</div>
  <div>載入中…</div>
</div>

<!-- Floating BG Dots -->
<div id="floatingDots"></div>

<!-- ── HEADER ── -->
<header>
  <div class="logo" onclick="showPage('home')">
    <span class="logo-icon">🧬</span>
    <div>
      <div>生物複習站</div>
      <div class="logo-sub">Bio Review</div>
    </div>
  </div>
  <nav>
    <button class="nav-btn active" id="nav-home"   onclick="showPage('home')">首頁</button>
    <button class="nav-btn"        id="nav-browse" onclick="showPage('browse')">瀏覽卡片</button>
    <button class="nav-btn"        id="nav-quiz"   onclick="showPage('quiz')">測驗</button>
    <button class="nav-btn"        id="nav-settings" onclick="openSettings()" title="GitHub 設定">⚙️</button>
  </nav>
</header>

<!-- ── TOKEN 設定 Modal ── -->
<div id="settingsModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:999; display:none; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:20px; padding:32px; width:90%; max-width:440px; box-shadow:0 20px 60px rgba(0,0,0,0.2);">
    <h2 style="font-family:'Nunito',sans-serif; font-weight:900; margin-bottom:8px;">⚙️ GitHub 設定</h2>
    <p style="font-size:0.88rem; color:#6B7280; margin-bottom:20px; line-height:1.6;">
      輸入你的 GitHub Personal Access Token，才能從網站上儲存卡片內容。<br>
      Token 只存在你的瀏覽器裡，不會上傳到任何地方。
    </p>
    <label style="font-size:0.8rem; font-weight:700; color:#6B7280; text-transform:uppercase; letter-spacing:0.05em;">GitHub Token</label>
    <input id="tokenInput" type="password"
      placeholder="ghp_xxxxxxxxxxxxxxxx"
      style="width:100%; margin-top:6px; padding:12px 16px; border:2px solid #E5E7EB; border-radius:12px; font-size:0.92rem; outline:none; font-family:'Noto Sans TC',sans-serif;"
      onfocus="this.style.borderColor='#4D96FF'"
      onblur="this.style.borderColor='#E5E7EB'">
    <div id="tokenStatus" style="font-size:0.82rem; margin-top:8px; min-height:18px;"></div>
    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
      <button onclick="closeSettings()"
        style="padding:10px 22px; border-radius:50px; border:2px solid #E5E7EB; background:#fff; font-family:'Nunito',sans-serif; font-weight:700; cursor:pointer;">
        取消
      </button>
      <button onclick="saveToken()"
        style="padding:10px 22px; border-radius:50px; border:none; background:linear-gradient(135deg,#4D96FF,#C77DFF); color:#fff; font-family:'Nunito',sans-serif; font-weight:700; cursor:pointer;">
        儲存 Token
      </button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════
     HOME PAGE
     ════════════════════════════════════ -->
<div class="page active" id="page-home">
  <div class="hero">
    <h1>搞定那些<em>搞不懂</em><br>的生物觀念 🎯</h1>
    <p>從你的錯題出發，精準複習每一個觀念，考前衝刺超有效率！</p>
    <div class="stats-row" id="statsRow"></div>
  </div>

  <div class="section-title">📚 選擇章節</div>
  <div class="chapter-grid" id="chapterGrid"></div>

  <div class="section-title">⚡ 快速開始</div>
  <div class="quick-actions">
    <div class="action-btn" onclick="startQuiz('all')">
      <div class="action-icon">🎲</div>
      <div class="action-text">
        <h3>全部隨機測驗</h3>
        <p>從所有章節中隨機出題，全面練習</p>
      </div>
    </div>
    <div class="action-btn" onclick="showPage('browse')">
      <div class="action-icon">📖</div>
      <div class="action-text">
        <h3>瀏覽所有卡片</h3>
        <p>查看觀念摘要、邏輯脈絡和陷阱提示</p>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════
     BROWSE PAGE
     ════════════════════════════════════ -->
<div class="page" id="page-browse">
  <div class="browse-controls">
    <input type="text" class="search-box" id="searchInput"
           placeholder="🔍 搜尋觀念、標籤…" oninput="filterCards()">
    <div class="filter-chips" id="filterChips"></div>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- ════════════════════════════════════
     QUIZ PAGE
     ════════════════════════════════════ -->
<div class="page" id="page-quiz">

  <!-- Setup -->
  <div class="quiz-setup" id="quizSetup">
    <h2>🎯 開始測驗</h2>
    <p>選擇範圍和題數，挑戰自己！</p>
    <div class="quiz-option-grid" id="quizChapterOptions"></div>
    <div class="count-options">
      <div class="count-card selected" onclick="selectCount(5, this)">
        <h4>5 題</h4><p>快速練習</p>
      </div>
      <div class="count-card" onclick="selectCount(10, this)">
        <h4>10 題</h4><p>標準測驗</p>
      </div>
      <div class="count-card" onclick="selectCount(999, this)">
        <h4>全部</h4><p>完整挑戰</p>
      </div>
    </div>
    <button class="start-btn" onclick="beginQuiz()">開始測驗 →</button>
  </div>

  <!-- Active Quiz -->
  <div class="quiz-active" id="quizActive" style="display:none;">
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-fill" id="quizProgressFill"></div>
    </div>
    <div class="quiz-meta">
      <span class="quiz-q-num" id="quizQNum"></span>
      <span class="quiz-score-label" id="quizScoreLabel">✅ 0  ❌ 0</span>
    </div>
    <div class="quiz-question-card">
      <span class="quiz-school" id="quizSchool"></span>
      <div class="quiz-question-text" id="quizQuestionText"></div>
      <div class="quiz-options" id="quizOptions"></div>
    </div>
    <div class="quiz-feedback" id="quizFeedback">
      <div class="feedback-result"  id="feedbackResult"></div>
      <div class="feedback-concept" id="feedbackConcept"></div>
      <div class="feedback-logic"   id="feedbackLogic"></div>
      <div class="feedback-pitfall" id="feedbackPitfall"></div>
    </div>
    <div class="quiz-nav">
      <button class="quiz-nav-btn"         onclick="exitQuiz()">離開</button>
      <button class="quiz-nav-btn primary" onclick="nextQuestion()" id="quizNextBtn" style="display:none;">下一題 →</button>
    </div>
  </div>

  <!-- Result -->
  <div class="quiz-result" id="quizResult" style="display:none;">
    <div id="resultEmoji" class="result-emoji"></div>
    <div id="resultCircle" class="result-circle">
      <div class="result-score" id="resultScore"></div>
      <div class="result-total" id="resultTotal"></div>
    </div>
    <div class="result-title"    id="resultTitle"></div>
    <div class="result-subtitle" id="resultSubtitle"></div>
    <div class="result-actions">
      <button class="result-btn primary" onclick="retryQuiz()">再來一次 🔄</button>
      <button class="result-btn"         onclick="showPage('quiz')">換題目</button>
      <button class="result-btn"         onclick="showPage('browse')">複習卡片</button>
    </div>
    <div id="missedSection"></div>
  </div>

</div>

<!-- ── SCRIPTS ── -->
<script src="config.js"></script>
<script src="github-api.js"></script>

<!-- CHAPTERS:START -->
  <script src="data/ch48.js?v=1778311477763"></script>
<!-- CHAPTERS:END -->

<script src="data/index.js"></script>
<script src="app.js"></script>

</body>
</html>
