name: Auto Update Chapters

on:
  push:
    paths:
      - 'data/ch*.js'
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Scan data/ and update index.html
        run: |
          python3 << 'PYEOF'
          import re
          import glob
          import os

          # 找出所有 data/ch*.js，依檔名排序
          files = sorted(glob.glob('data/ch*.js'))

          if not files:
              print("No chapter files found, skipping.")
              exit(0)

          # 組成 <script> 標籤區塊
          script_tags = '\n'.join(f'  <script src="{f}"></script>' for f in files)
          new_block = f'<!-- CHAPTERS:START -->\n{script_tags}\n<!-- CHAPTERS:END -->'

          # 讀取 index.html
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          # 替換 CHAPTERS 區塊
          updated = re.sub(
              r'<!-- CHAPTERS:START -->.*?<!-- CHAPTERS:END -->',
              new_block,
              content,
              flags=re.DOTALL
          )

          # 寫回 index.html
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(updated)

          print(f"Done! Added {len(files)} chapter(s): {files}")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: auto-update chapter scripts"
          git push
